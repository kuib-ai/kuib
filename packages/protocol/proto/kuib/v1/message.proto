syntax = "proto3";

package kuib.v1;

import "google/protobuf/struct.proto";

// ---------------------------------------------------------------------------
// RuntimeMetadata
// ---------------------------------------------------------------------------
message CacheUsage {
  uint32 read = 1;
  uint32 write = 2;
}

message TokenUsage {
  uint32 input = 1;
  uint32 output = 2;
  optional uint32 reasoning = 3;
  CacheUsage cache = 4;
}

message ModelRef {
  string provider_id = 1;
  string model_id = 2;
}

// ---------------------------------------------------------------------------
// ToolCall state primitives
// ---------------------------------------------------------------------------
enum ToolCallErrorReason {
  TOOL_CALL_ERROR_REASON_UNSPECIFIED = 0;
  TOOL_CALL_ERROR_REASON_FAILED = 1;
  TOOL_CALL_ERROR_REASON_INTERRUPTED = 2;
  TOOL_CALL_ERROR_REASON_CANCELLED = 3;
  TOOL_CALL_ERROR_REASON_REJECTED = 4;
}

message ToolCallPending {
  google.protobuf.Struct input = 1;
  string title = 2;
  double started_at = 3;
}

message ToolCallCompletedNormal {
  string output = 1;
  double completed_at = 2;
}

message ToolCallCompletedSubagent {
  string output = 1;
  double completed_at = 2;
  ModelRef model = 3;
  TokenUsage tokens = 4;
}

message ToolCallErrorNormal {
  ToolCallErrorReason reason = 1;
  string error = 2;
  double completed_at = 3;
}

message ToolCallErrorSubagent {
  ToolCallErrorReason reason = 1;
  string error = 2;
  double completed_at = 3;
  ModelRef model = 4;
  TokenUsage tokens = 5;
}

message ToolCallState {
  oneof state {
    ToolCallPending pending = 1;
    ToolCallCompletedNormal completed_normal = 2;
    ToolCallCompletedSubagent completed_subagent = 3;
    ToolCallErrorNormal error_normal = 4;
    ToolCallErrorSubagent error_subagent = 5;
  }
}

// ---------------------------------------------------------------------------
// Part primitives for message formation
// ---------------------------------------------------------------------------
message PartText {
  string part_id = 1;
  bool excluded = 2;
  string text = 3;
}

message PartReasoning {
  string part_id = 1;
  bool excluded = 2;
  string text = 3;
}

message PartFile {
  string part_id = 1;
  bool excluded = 2;
  string mime = 3;
  optional string filename = 4;
  string url = 5;
}

message PartToolCall {
  string part_id = 1;
  bool excluded = 2;
  string call_id = 3;
  string tool = 4;
  ToolCallState state = 5;
}

enum StepBoundaryStopReason {
  STEP_BOUNDARY_STOP_REASON_UNSPECIFIED = 0;
  STEP_BOUNDARY_STOP_REASON_INTERRUPTED = 1;
  STEP_BOUNDARY_STOP_REASON_TOOL_CALL_REQUEST = 2;
  STEP_BOUNDARY_STOP_REASON_NORMAL = 3;
  STEP_BOUNDARY_STOP_REASON_LENGTH = 4;
  STEP_BOUNDARY_STOP_REASON_CONTENT_FILTER = 5;
}

message PartStepBoundaryStart {
  string part_id = 1;
  bool excluded = 2;
}

message PartStepBoundaryStop {
  string part_id = 1;
  bool excluded = 2;
  StepBoundaryStopReason reason = 3;
  ModelRef model = 4;
  TokenUsage tokens = 5;
}

message PartUser {
  oneof type {
    PartText text = 1;
    PartFile file = 2;
  }
}

message PartAssistant {
  oneof type {
    PartText text = 1;
    PartReasoning reasoning = 2;
    PartFile file = 3;
    PartToolCall tool_call = 4;
    PartStepBoundaryStart step_boundary_start = 5;
    PartStepBoundaryStop step_boundary_stop = 6;
  }
}

message Part {
  oneof role {
    PartUser user = 1;
    PartAssistant assistant = 2;
  }
}

// ---------------------------------------------------------------------------
// Message primitives
// ---------------------------------------------------------------------------
message MessageUser {
  uint32 version = 1;
  string id = 2;
  string session_id = 3;
  string discussion_id = 4;
  double created_at = 5;
  repeated PartUser parts = 6;
  string origin_device_id = 7;
}

message MessageAssistantSuccess {
  uint32 version = 1;
  string id = 2;
  string session_id = 3;
  string discussion_id = 4;
  double created_at = 5;
  repeated PartAssistant parts = 6;
  double completed_at = 7;
}

message MessageAssistantErrorApi {
  uint32 version = 1;
  string id = 2;
  string session_id = 3;
  string discussion_id = 4;
  double created_at = 5;
  repeated PartAssistant parts = 6;
  string error = 7;
  uint32 status_code = 8;
}

message MessageAssistantErrorUnknown {
  uint32 version = 1;
  string id = 2;
  string session_id = 3;
  string discussion_id = 4;
  double created_at = 5;
  repeated PartAssistant parts = 6;
  string error = 7;
}

message MessageAssistantErrorContextOverflow {
  uint32 version = 1;
  string id = 2;
  string session_id = 3;
  string discussion_id = 4;
  double created_at = 5;
  repeated PartAssistant parts = 6;
  string error = 7;
}

message Message {
  oneof type {
    MessageUser user = 1;
    MessageAssistantSuccess assistant_success = 2;
    MessageAssistantErrorApi assistant_error_api = 3;
    MessageAssistantErrorUnknown assistant_error_unknown = 4;
    MessageAssistantErrorContextOverflow assistant_error_context_overflow = 5;
  }
}
