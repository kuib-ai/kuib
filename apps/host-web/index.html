<!doctype html>
<!-- @context @journal/host-layer -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Bun injects the per-run token here when it serves the built page.
         In dev (Vite server) it stays as the placeholder → client asks /api/token. -->
    <meta name="kuib-token" content="__KUIB_TOKEN__" />
    <title>kuib web</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font:
          14px/1.5 ui-monospace,
          SFMono-Regular,
          Menlo,
          monospace;
        background: #1a1b26;
        color: #c0caf5;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      #log {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
      }
      .entry {
        white-space: pre-wrap;
        margin: 0 0 8px;
      }
      .user {
        color: #7aa2f7;
      }
      .assistant {
        color: #9ece6a;
      }
      .reasoning {
        color: #565f89;
      }
      .tool {
        color: #e0af68;
      }
      #status {
        padding: 4px 16px;
        font-size: 12px;
        color: #565f89;
        border-top: 1px solid #292e42;
      }
      form {
        display: flex;
        padding: 12px 16px;
        gap: 8px;
        border-top: 1px solid #292e42;
      }
      input {
        flex: 1;
        background: #24283b;
        border: 1px solid #292e42;
        color: #c0caf5;
        padding: 8px 10px;
        border-radius: 6px;
        font: inherit;
      }
      button {
        background: #7aa2f7;
        color: #1a1b26;
        border: 0;
        padding: 8px 14px;
        border-radius: 6px;
        font: inherit;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/client/main.tsx"></script>
  </body>
</html>
